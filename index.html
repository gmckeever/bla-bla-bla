<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Bla Bla Bla">
<title>Bla Bla Bla</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }
  #canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #fff;
    z-index: 100;
    gap: 24px;
    padding: 40px;
    text-align: center;
  }
  #start-screen h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #start-screen p {
    font-size: 16px;
    color: #888;
    max-width: 280px;
    line-height: 1.6;
  }
  #start-btn, #retry-btn {
    margin-top: 16px;
    padding: 18px 56px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #error-msg {
    display: none;
    color: #ff4444;
    font-size: 14px;
    max-width: 280px;
    line-height: 1.5;
  }
  #dots {
    position: fixed;
    bottom: calc(68px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  #dots.visible { opacity: 1; pointer-events: auto; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }
  .dot.active {
    background: #fff;
    transform: scale(1.3);
  }
  #nav-arrows {
    position: fixed;
    top: 50%;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    transform: translateY(-50%);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  #nav-arrows.visible { opacity: 1; pointer-events: auto; }
  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Toolbar ──────────────────────────────────────────────────────────── */
  #toolbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(60px + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: #fff;
    display: flex;
    align-items: center;
    z-index: 20;
    border-top: 1px solid #e8e8e8;
  }
  #toolbar-info, #toolbar-menu {
    width: 90px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #000;
    cursor: pointer;
    background: none;
    border: none;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    padding: 0 12px;
    height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  #toolbar-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0 4px;
  }
  #sensitivity-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: #aaa;
    text-transform: uppercase;
    user-select: none;
  }
  #sensitivity-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: #ddd;
    border-radius: 1px;
    outline: none;
    cursor: pointer;
  }
  #sensitivity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #bbb;
    border: none;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  #sensitivity-slider::-moz-range-thumb {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #bbb;
    border: none;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  /* ── Menu overlay ─────────────────────────────────────────────────────── */
  #menu-overlay {
    position: fixed;
    inset: 0;
    background: #111;
    z-index: 50;
    display: none;
    flex-direction: column;
  }
  #menu-overlay.open { display: flex; }
  #menu-header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: max(16px, env(safe-area-inset-top, 16px)) 16px 12px;
    flex-shrink: 0;
  }
  #menu-close {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px 4px;
    -webkit-tap-highlight-color: transparent;
  }
  #face-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    padding: 0 2px;
    overflow-y: auto;
    flex: 1;
    padding-bottom: calc(2px + env(safe-area-inset-bottom, 0px));
  }
  .face-tile {
    position: relative;
    aspect-ratio: 3 / 4;
    cursor: pointer;
    overflow: hidden;
    background: #000;
  }
  .face-tile canvas {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center 40%;
  }
  .face-tile-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 8px 6px 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
    user-select: none;
  }
  .face-tile.active-face::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 3px solid #fff;
    pointer-events: none;
  }
  /* ── Info modal ───────────────────────────────────────────────────────── */
  #info-modal {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
  }
  #info-modal.open { display: flex; }
  #info-box {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    max-width: 300px;
    text-align: center;
  }
  #info-box h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  #info-box p {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  #info-close {
    padding: 10px 28px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: #000;
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="start-screen">
  <h1>Bla<br>Bla<br>Bla</h1>
  <p>Speak and the face will move with your voice</p>
  <div id="error-msg">Please allow microphone access in Settings to use this app.</div>
  <button id="start-btn">Start</button>
  <button id="retry-btn" style="display:none">Try Again</button>
</div>

<div id="dots"></div>
<div id="nav-arrows">
  <button class="nav-btn" id="prev-btn">&#8249;</button>
  <button class="nav-btn" id="next-btn">&#8250;</button>
</div>

<div id="toolbar">
  <button id="toolbar-info">INFO</button>
  <div id="toolbar-center">
    <input id="sensitivity-slider" type="range" min="0" max="100" value="40">
    <div id="sensitivity-label">Audio Sensitivity</div>
  </div>
  <button id="toolbar-menu">MENU</button>
</div>

<div id="menu-overlay">
  <div id="menu-header">
    <button id="menu-close">CLOSE</button>
  </div>
  <div id="face-grid"></div>
</div>

<div id="info-modal">
  <div id="info-box">
    <h2>Bla Bla Bla</h2>
    <p>Speak and watch the faces react to your voice. Swipe or use arrows to switch faces. Adjust the sensitivity bar to match your environment.</p>
    <button id="info-close">OK</button>
  </div>
</div>

<script>
// ─── PWA: Manifest via blob ───────────────────────────────────────────────────
(function() {
  const manifest = {
    name: "Bla Bla Bla",
    short_name: "BlaBla",
    display: "standalone",
    orientation: "portrait",
    background_color: "#000000",
    theme_color: "#000000",
    start_url: ".",
    icons: [{ src: "icon.png", sizes: "192x192", type: "image/png" }]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);
})();

// ─── Service Worker (inline blob) ─────────────────────────────────────────────
(function() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
    const CACHE = 'blabla-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
})();

// ─── Apple touch icon (canvas-drawn) ─────────────────────────────────────────
(function() {
  const ic = document.createElement('canvas');
  ic.width = ic.height = 192;
  const cx = ic.getContext('2d');
  cx.fillStyle = '#000';
  cx.fillRect(0, 0, 192, 192);
  cx.fillStyle = '#fff';
  cx.beginPath();
  cx.ellipse(96, 96, 60, 72, 0, 0, Math.PI * 2);
  cx.fill();
  cx.fillStyle = '#000';
  cx.beginPath(); cx.ellipse(76, 82, 8, 10, 0, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse(116, 82, 8, 10, 0, 0, Math.PI * 2); cx.fill();
  cx.beginPath();
  cx.ellipse(96, 116, 18, 10, 0, 0, Math.PI);
  cx.fill();
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = ic.toDataURL();
  document.head.appendChild(link);
})();

// ─── Audio setup ─────────────────────────────────────────────────────────────
let audioCtx, analyser, dataArray, smoothedVolume = 0;

// ─── Sensitivity (persisted) ─────────────────────────────────────────────────
let sensitivity = parseFloat(localStorage.getItem('blabla-sensitivity') || '0.4');

async function startAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.3;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    return true;
  } catch (e) {
    return false;
  }
}

function getVolume() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
  const raw = (sum / dataArray.length) / 128.0;
  smoothedVolume = smoothedVolume * 0.75 + raw * 0.25;
  // sensitivity 0..1 maps divisor 0.9..0.06; vol can exceed 1.0 for exaggeration
  const divisor = 0.9 - sensitivity * 0.84;
  return Math.min(smoothedVolume / divisor, 1.3);
}

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resize);
resize();

// ─── FACE DRAWING FUNCTIONS ────────────────────────────────────────────────────

// Helper: lerp
const lerp = (a, b, t) => a + (b - a) * t;

// 1. Abstract Parametric Mask (Bauhaus minimal)
function drawParametric(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const headW = W * 0.28, headH = H * 0.38;

  // Head
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx, cy - H * 0.02, headW, headH, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Eyes
  const eyeY = cy - H * 0.08;
  const eyeR = lerp(5, 10, vol);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - headW * 0.32, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + headW * 0.32, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();

  // Mouth: line → O
  const mouthY = cy + H * 0.1;
  const mouthW = headW * 0.55;
  const openH = lerp(0, headH * 0.35, vol);

  ctx.beginPath();
  if (vol < 0.05) {
    ctx.moveTo(cx - mouthW / 2, mouthY);
    ctx.lineTo(cx + mouthW / 2, mouthY);
  } else {
    ctx.ellipse(cx, mouthY, mouthW / 2, openH, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
  }
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// 2. Happy Round Face
function drawHappy(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const r = Math.min(W, H) * 0.3;

  // Rosy cheeks
  const blush = Math.max(0, vol - 0.2);
  ctx.fillStyle = `rgba(255,150,150,${0.2 + blush * 0.4})`;
  ctx.beginPath(); ctx.ellipse(cx - r * 0.62, cy + r * 0.1, r * 0.22, r * 0.14, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + r * 0.62, cy + r * 0.1, r * 0.22, r * 0.14, 0, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.fillStyle = '#f5d06a';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#e8b84b';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Eyes: arcs that open wider
  const eyeY = cy - r * 0.2;
  const eyeOpenAngle = lerp(0.3, Math.PI * 0.5, vol);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    const ex = cx + side * r * 0.32;
    ctx.beginPath();
    ctx.arc(ex, eyeY, r * 0.12, Math.PI + eyeOpenAngle, Math.PI * 2 - eyeOpenAngle);
    ctx.stroke();
    // pupils
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(ex, eyeY + r * 0.04, r * 0.05, 0, Math.PI * 2); ctx.fill();
  });

  // Mouth: smile → open circle
  const mouthY = cy + r * 0.3;
  const mouthW = r * 0.6;
  const openH = lerp(0, r * 0.45, vol);
  ctx.fillStyle = vol > 0.05 ? '#c0392b' : 'transparent';
  ctx.beginPath();
  ctx.ellipse(cx, mouthY, mouthW / 2, Math.max(1, openH), 0, 0, Math.PI);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Teeth at high volume
  if (vol > 0.3) {
    ctx.fillStyle = '#fff';
    const tw = mouthW * 0.7;
    const th = openH * 0.45;
    ctx.beginPath();
    ctx.rect(cx - tw / 2, mouthY - th * 0.1, tw, th);
    ctx.fill();
  }
}

// 3. Surprised Monster
function drawMonster(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const scale = Math.min(W, H) * 0.35;

  // Blob body
  ctx.fillStyle = '#4a9e6b';
  ctx.beginPath();
  ctx.moveTo(cx, cy - scale);
  ctx.bezierCurveTo(cx + scale * 1.2, cy - scale * 0.9, cx + scale * 1.1 + vol * scale * 0.2, cy + scale * 0.7, cx, cy + scale);
  ctx.bezierCurveTo(cx - scale * 1.1 - vol * scale * 0.2, cy + scale * 0.7, cx - scale * 1.2, cy - scale * 0.9, cx, cy - scale);
  ctx.fill();
  ctx.strokeStyle = '#357a52';
  ctx.lineWidth = 4;
  ctx.stroke();

  // Bulging eyes
  const eyeR = lerp(scale * 0.14, scale * 0.22, vol);
  const eyeY = cy - scale * 0.25;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - scale * 0.38, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + scale * 0.38, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
  // pupils
  const pupilR = eyeR * 0.45;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - scale * 0.38 + vol * 3, eyeY + vol * 2, pupilR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + scale * 0.38 - vol * 3, eyeY + vol * 2, pupilR, 0, Math.PI * 2); ctx.fill();

  // Wide mouth with teeth
  const mouthY = cy + scale * 0.2;
  const mouthW = lerp(scale * 0.3, scale * 0.9, vol);
  const mouthH = lerp(scale * 0.05, scale * 0.55, vol);
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(cx, mouthY, mouthW, mouthH, 0, 0, Math.PI * 2);
  ctx.fill();

  if (vol > 0.2 && mouthH > 10) {
    // Teeth top
    ctx.fillStyle = '#fff';
    const teeth = 4;
    const tw = (mouthW * 1.6) / teeth;
    for (let i = 0; i < teeth; i++) {
      const tx = cx - mouthW * 0.8 + i * tw;
      ctx.beginPath();
      ctx.moveTo(tx, mouthY - mouthH * 0.2);
      ctx.lineTo(tx + tw * 0.45, mouthY + mouthH * 0.35);
      ctx.lineTo(tx + tw * 0.9, mouthY - mouthH * 0.2);
      ctx.closePath();
      ctx.fill();
    }
    // Tongue
    if (vol > 0.5) {
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.ellipse(cx, mouthY + mouthH * 0.4, mouthW * 0.5, mouthH * 0.45, 0, 0, Math.PI);
      ctx.fill();
    }
  }
}

// 4. Sad/Neutral Mask
function drawSad(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const headW = W * 0.24, headH = H * 0.34;

  // Head: pale oval
  ctx.fillStyle = '#c8b89a';
  ctx.beginPath(); ctx.ellipse(cx, cy, headW, headH, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#a89070';
  ctx.lineWidth = 3; ctx.stroke();

  // Drooping eyebrows
  const browDrop = lerp(0, -10, vol);
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = 5; ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    const bx = cx + side * headW * 0.35;
    const by = cy - headH * 0.35 + browDrop;
    ctx.beginPath();
    ctx.moveTo(bx - side * 18, by - 4 * side);
    ctx.lineTo(bx + side * 18, by + 4 * side);
    ctx.stroke();
  });

  // Eyes: half-closed circles
  const eyeY = cy - headH * 0.18;
  ctx.fillStyle = '#5a3a1a';
  [-1, 1].forEach(side => {
    const ex = cx + side * headW * 0.35;
    ctx.beginPath();
    ctx.arc(ex, eyeY, 10, 0, Math.PI * 2); ctx.fill();
    // Eyelid (sad = drooping)
    ctx.fillStyle = '#c8b89a';
    ctx.beginPath();
    ctx.ellipse(ex, eyeY - 2, 11, lerp(10, 3, vol), 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5a3a1a';
  });

  // Mouth: downturned, opens downward
  const mouthY = cy + headH * 0.25;
  const mouthW = headW * 0.6;
  const dropH = lerp(0, headH * 0.3, vol);
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - mouthW / 2, mouthY);
  ctx.bezierCurveTo(
    cx - mouthW / 4, mouthY + 16 + dropH,
    cx + mouthW / 4, mouthY + 16 + dropH,
    cx + mouthW / 2, mouthY
  );
  ctx.stroke();
  if (vol > 0.15) {
    ctx.fillStyle = '#4a2010';
    ctx.beginPath();
    ctx.moveTo(cx - mouthW / 2, mouthY);
    ctx.bezierCurveTo(cx - mouthW / 4, mouthY + 16 + dropH, cx + mouthW / 4, mouthY + 16 + dropH, cx + mouthW / 2, mouthY);
    ctx.lineTo(cx, mouthY + dropH * 1.1 + 10);
    ctx.closePath(); ctx.fill();
  }
}

// 5. Bravi Blob — the Lorenzo Bravi original frog/blob character
// B&W: white blob body, giant bullseye eyes, round nostrils, jaw drops open
function drawBraviFrog(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const bw = Math.min(W * 0.70, H * 0.62);
  const bh = Math.min(H * 0.80, W * 0.85);
  const blobTop  = cy - bh * 0.50;
  const jawLine  = cy + bh * 0.26;   // mouth split point
  const jawH     = bh * 0.13;        // height of lower jaw strip
  const jawDrop  = lerp(0, bh * 0.46, vol);
  const blobL = cx - bw / 2, blobR = cx + bw / 2;
  const cr = bw * 0.09;              // corner radius

  // ── Upper body (rounded top, flat bottom at jawLine) ──────────────────────
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(blobL + cr, blobTop);
  ctx.lineTo(blobR - cr, blobTop);
  ctx.arcTo(blobR, blobTop, blobR, blobTop + cr, cr);
  ctx.lineTo(blobR, jawLine);
  ctx.lineTo(blobL, jawLine);
  ctx.lineTo(blobL, blobTop + cr);
  ctx.arcTo(blobL, blobTop, blobL + cr, blobTop, cr);
  ctx.closePath();
  ctx.fill();

  // ── Lower jaw strip (drops down with vol) ────────────────────────────────
  const jY = jawLine + jawDrop;
  const jBot = jY + jawH;
  const jr = bw * 0.055;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(blobL, jY);
  ctx.lineTo(blobR, jY);
  ctx.lineTo(blobR, jBot - jr);
  ctx.arcTo(blobR, jBot, blobR - jr, jBot, jr);
  ctx.lineTo(blobL + jr, jBot);
  ctx.arcTo(blobL, jBot, blobL, jBot - jr, jr);
  ctx.lineTo(blobL, jY);
  ctx.closePath();
  ctx.fill();

  // ── Mouth line (visible when closed) ─────────────────────────────────────
  const lineAlpha = Math.max(0, 1 - vol * 8);
  if (lineAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = lineAlpha;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(blobL, jawLine);
    ctx.lineTo(blobR, jawLine);
    ctx.stroke();
    ctx.restore();
  }

  // ── Eyes — bullseye concentric circles ────────────────────────────────────
  const eyeY  = blobTop + bh * 0.30;
  const eyeR  = bw * 0.215;
  const eyeXL = cx - bw * 0.22;
  const eyeXR = cx + bw * 0.22;

  [eyeXL, eyeXR].forEach(ex => {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = eyeR * 0.07;
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR * 0.70, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR * 0.44, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR * 0.20, 0, Math.PI * 2); ctx.fill();
  });

  // ── Nostrils — two round black circles below eyes ─────────────────────────
  const nY = eyeY + eyeR * 1.35;
  const nR = eyeR * 0.35;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - nR * 1.25, nY, nR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + nR * 1.25, nY, nR, 0, Math.PI * 2); ctx.fill();
}

// 5b. Vertical Stripes Face — from the original Bla Bla Bla video
// Same jaw-drop mechanic as the blob but both body and jaw are textured with bars
function drawStripes(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const bw = Math.min(W * 0.66, H * 0.58);
  const bh = Math.min(H * 0.76, W * 0.82);
  const bL = cx - bw / 2, bR = cx + bw / 2;
  const bT = cy - bh * 0.50;
  const jawLine = cy + bh * 0.24;
  const jawH = bh * 0.12;
  const jawDrop = lerp(0, bh * 0.44, vol);
  const jawY = jawLine + jawDrop;
  const jBot = jawY + jawH;
  const cr = bw * 0.07;
  const numBars = 9;
  const barW = bw / (numBars * 2 - 1);
  const barGap = barW;

  // ── Upper body: clipped white fill + bars ─────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bL + cr, bT);
  ctx.arcTo(bR, bT, bR, bT + cr, cr);
  ctx.lineTo(bR, jawLine);
  ctx.lineTo(bL, jawLine);
  ctx.lineTo(bL, bT + cr);
  ctx.arcTo(bL, bT, bL + cr, bT, cr);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = '#fff'; ctx.fillRect(bL, bT, bw, jawLine - bT);
  ctx.fillStyle = '#000';
  for (let i = 0; i < numBars; i++) ctx.fillRect(bL + i * (barW + barGap), bT, barW, jawLine - bT);
  ctx.restore();

  // ── Lower jaw strip: clipped white fill + bars ────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bL, jawY);
  ctx.lineTo(bR, jawY);
  ctx.lineTo(bR, jBot - cr);
  ctx.arcTo(bR, jBot, bR - cr, jBot, cr);
  ctx.lineTo(bL + cr, jBot);
  ctx.arcTo(bL, jBot, bL, jBot - cr, cr);
  ctx.lineTo(bL, jawY);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = '#fff'; ctx.fillRect(bL, jawY, bw, jawH);
  ctx.fillStyle = '#000';
  for (let i = 0; i < numBars; i++) ctx.fillRect(bL + i * (barW + barGap), jawY, barW, jawH);
  ctx.restore();

  // ── Mouth line (visible when closed) ──────────────────────────────────────
  const lineAlpha = Math.max(0, 1 - vol * 8);
  if (lineAlpha > 0) {
    ctx.save(); ctx.globalAlpha = lineAlpha;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(bL, jawLine); ctx.lineTo(bR, jawLine); ctx.stroke();
    ctx.restore();
  }

  // ── Eyes: white circles punch through bars ────────────────────────────────
  const eyeY = bT + bh * 0.30;
  const eyeR = bw * 0.185;
  [cx - bw * 0.22, cx + bw * 0.22].forEach(ex => {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = eyeR * 0.07;
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeR * 0.38, 0, Math.PI * 2); ctx.fill();
  });
}

// 5c. Bear Face — minimal round dark face from the video
function drawBear(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const r = Math.min(W, H) * 0.30;

  // Ears
  ctx.fillStyle = '#1a1208';
  ctx.beginPath(); ctx.arc(cx - r * 0.72, cy - r * 0.78, r * 0.26, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.72, cy - r * 0.78, r * 0.26, 0, Math.PI * 2); ctx.fill();
  // Inner ears
  ctx.fillStyle = '#3a2010';
  ctx.beginPath(); ctx.arc(cx - r * 0.72, cy - r * 0.78, r * 0.14, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.72, cy - r * 0.78, r * 0.14, 0, Math.PI * 2); ctx.fill();

  // Face circle
  ctx.fillStyle = '#1a1208';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

  // Snout
  ctx.fillStyle = '#2e1e0e';
  ctx.beginPath(); ctx.ellipse(cx, cy + r * 0.28, r * 0.44, r * 0.30, 0, 0, Math.PI * 2); ctx.fill();

  // Eyes — round white with dark pupils that widen with vol
  const eyeY = cy - r * 0.20;
  const eyeR = lerp(r * 0.14, r * 0.20, vol);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - r * 0.35, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.35, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - r * 0.35, eyeY, eyeR * 0.52, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.35, eyeY, eyeR * 0.52, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(cx - r * 0.28, eyeY - eyeR * 0.28, eyeR * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.42, eyeY - eyeR * 0.28, eyeR * 0.22, 0, Math.PI * 2); ctx.fill();

  // Nose
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(cx, cy + r * 0.16, r * 0.14, r * 0.10, 0, 0, Math.PI * 2); ctx.fill();

  // Mouth — opens with vol
  const mouthY = cy + r * 0.38;
  const mouthW = lerp(r * 0.18, r * 0.42, vol);
  const mouthH = lerp(r * 0.04, r * 0.28, vol);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, mouthY, mouthW, mouthH, 0, 0, Math.PI * 2);
  ctx.fill();
  if (vol > 0.3) {
    // Teeth
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(cx, mouthY - mouthH * 0.1, mouthW * 0.7, mouthH * 0.45, 0, 0, Math.PI);
    ctx.fill();
  }
}

// Pearl — sassy viral baby, "I'm gonna put you on the street"
function drawPearl(ctx, W, H, vol) {
  const cx = W / 2, cy = H * 0.46;
  const scale = Math.min(W, H) * 0.30;

  // Yellow-green dress body
  ctx.fillStyle = '#a8c832';
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.9, H);
  ctx.lineTo(cx - scale * 0.68, cy + scale * 0.72);
  ctx.bezierCurveTo(cx - scale * 0.48, cy + scale * 0.60, cx + scale * 0.48, cy + scale * 0.60, cx + scale * 0.68, cy + scale * 0.72);
  ctx.lineTo(cx + scale * 0.9, H);
  ctx.closePath();
  ctx.fill();
  // Puff sleeves
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.62, cy + scale * 0.58, scale * 0.24, scale * 0.17, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.62, cy + scale * 0.58, scale * 0.24, scale * 0.17, 0.5, 0, Math.PI * 2); ctx.fill();
  // Dress neckline detail
  ctx.fillStyle = '#7cb828';
  ctx.beginPath(); ctx.ellipse(cx, cy + scale * 0.60, scale * 0.30, scale * 0.08, 0, 0, Math.PI * 2); ctx.fill();

  // Neck
  ctx.fillStyle = '#ffd0b0';
  ctx.beginPath(); ctx.ellipse(cx, cy + scale * 0.48, scale * 0.17, scale * 0.15, 0, 0, Math.PI * 2); ctx.fill();

  // Face — very round chubby baby
  ctx.fillStyle = '#ffd0b0';
  ctx.beginPath(); ctx.arc(cx, cy, scale * 0.52, 0, Math.PI * 2); ctx.fill();

  // Chubby cheek blush
  ctx.fillStyle = '#ffaa88';
  ctx.globalAlpha = 0.45;
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.39, cy + scale * 0.14, scale * 0.20, scale * 0.13, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.39, cy + scale * 0.14, scale * 0.20, scale * 0.13, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // Wispy blonde hair
  ctx.fillStyle = '#f5cc50';
  ctx.beginPath(); ctx.ellipse(cx, cy - scale * 0.44, scale * 0.48, scale * 0.14, 0, 0, Math.PI * 2); ctx.fill();
  // Individual wisps sticking up
  ctx.strokeStyle = '#f0c040'; ctx.lineWidth = scale * 0.055; ctx.lineCap = 'round';
  [[cx - scale * 0.10, -0.52, -0.18, -0.82, -0.06, -0.90],
   [cx + scale * 0.08, -0.52, +0.22, -0.82, +0.14, -0.88],
   [cx + scale * 0.24, -0.48, +0.40, -0.75, +0.30, -0.80]].forEach(([sx, sy, c1x, c1y, ex, ey]) => {
    ctx.beginPath();
    ctx.moveTo(sx, cy + sy * scale);
    ctx.bezierCurveTo(cx + c1x * scale, cy + c1y * scale, cx + ex * scale, cy + ey * scale, cx + ex * scale, cy + ey * scale);
    ctx.stroke();
  });

  // Eyes — sassy squint at rest, open wide when loud
  const eyeY = cy - scale * 0.08;
  const eyeH  = lerp(scale * 0.075, scale * 0.135, vol);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.22, eyeY, scale * 0.13, eyeH, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.22, eyeY, scale * 0.13, eyeH, 0, 0, Math.PI * 2); ctx.fill();
  // Blue irises
  ctx.fillStyle = '#4a7acc';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.22, eyeY, scale * 0.078, Math.min(eyeH * 0.9, scale * 0.078), 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.22, eyeY, scale * 0.078, Math.min(eyeH * 0.9, scale * 0.078), 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.22, eyeY, scale * 0.038, Math.min(eyeH * 0.52, scale * 0.038), 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.22, eyeY, scale * 0.038, Math.min(eyeH * 0.52, scale * 0.038), 0, 0, Math.PI * 2); ctx.fill();
  // Sassy eyelid squint overdraw (reduces when loud)
  const squint = lerp(eyeH * 0.55, 0, vol);
  ctx.fillStyle = '#ffd0b0';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.22, eyeY - eyeH * 0.4, scale * 0.14, squint, 0, Math.PI, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.22, eyeY - eyeH * 0.4, scale * 0.14, squint, 0, Math.PI, Math.PI * 2); ctx.fill();

  // Button nose
  ctx.fillStyle = '#e8a888';
  ctx.beginPath(); ctx.ellipse(cx, cy + scale * 0.08, scale * 0.08, scale * 0.06, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#c07858'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx - scale * 0.052, cy + scale * 0.12, scale * 0.04, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + scale * 0.052, cy + scale * 0.12, scale * 0.04, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();

  // Mouth — sassy smirk → wide open
  const mouthY = cy + scale * 0.28;
  const mouthW = lerp(scale * 0.20, scale * 0.44, vol);
  const openH  = lerp(scale * 0.03, scale * 0.26, vol);
  if (vol < 0.12) {
    // Smirk at rest
    ctx.strokeStyle = '#b05038'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - mouthW * 0.55, mouthY + scale * 0.01);
    ctx.bezierCurveTo(cx - mouthW * 0.1, mouthY + scale * 0.04, cx + mouthW * 0.2, mouthY + scale * 0.05, cx + mouthW * 0.55, mouthY - scale * 0.01);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#801808';
    ctx.beginPath();
    ctx.moveTo(cx - mouthW, mouthY);
    ctx.bezierCurveTo(cx - mouthW * 0.6, mouthY - scale * 0.04, cx + mouthW * 0.6, mouthY - scale * 0.04, cx + mouthW, mouthY);
    ctx.bezierCurveTo(cx + mouthW * 0.55, mouthY + openH, cx - mouthW * 0.55, mouthY + openH, cx - mouthW, mouthY);
    ctx.closePath(); ctx.fill();
    if (vol > 0.3) {
      ctx.fillStyle = '#f5f0ec';
      ctx.beginPath(); ctx.ellipse(cx, mouthY, mouthW * 0.68, openH * 0.38, 0, 0, Math.PI); ctx.fill();
    }
  }

  // Caption
  const capY = cy + scale * 1.28;
  ctx.font = `bold ${Math.round(scale * 0.155)}px -apple-system, Helvetica, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText("I'm gonna put you on the street", cx + 1, capY + 1);
  ctx.fillStyle = '#fff';
  ctx.fillText("I'm gonna put you on the street", cx, capY);
}

// Greg — slim face, short dark wavy hair, giant cheerful smile
function drawGreg(ctx, W, H, vol) {
  const cx = W / 2, cy = H * 0.50;
  const scale = Math.min(W, H) * 0.30;

  // Black t-shirt
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.9, H);
  ctx.lineTo(cx - scale * 0.72, cy + scale * 0.72);
  ctx.bezierCurveTo(cx - scale * 0.52, cy + scale * 0.60, cx + scale * 0.52, cy + scale * 0.60, cx + scale * 0.72, cy + scale * 0.72);
  ctx.lineTo(cx + scale * 0.9, H);
  ctx.closePath(); ctx.fill();
  // Crew neck
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.ellipse(cx, cy + scale * 0.55, scale * 0.28, scale * 0.09, 0, Math.PI, Math.PI * 2); ctx.stroke();

  // Neck
  ctx.fillStyle = '#f0c89a';
  ctx.beginPath(); ctx.rect(cx - scale * 0.17, cy + scale * 0.46, scale * 0.34, scale * 0.28); ctx.fill();

  // Face — slim oval, light skin
  ctx.fillStyle = '#f5cfa0';
  ctx.beginPath();
  ctx.ellipse(cx, cy - scale * 0.02, scale * 0.42, scale * 0.58, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#e8b888';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.44, cy + scale * 0.06, scale * 0.07, scale * 0.10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.44, cy + scale * 0.06, scale * 0.07, scale * 0.10, 0, 0, Math.PI * 2); ctx.fill();

  // Hair — dark brown, swept back, slightly wavy
  ctx.fillStyle = '#241408';
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.42, cy - scale * 0.42);
  ctx.bezierCurveTo(cx - scale * 0.46, cy - scale * 0.78, cx - scale * 0.22, cy - scale * 0.98, cx + scale * 0.04, cy - scale * 0.98);
  ctx.bezierCurveTo(cx + scale * 0.30, cy - scale * 0.98, cx + scale * 0.46, cy - scale * 0.78, cx + scale * 0.42, cy - scale * 0.42);
  ctx.bezierCurveTo(cx + scale * 0.32, cy - scale * 0.52, cx - scale * 0.32, cy - scale * 0.52, cx - scale * 0.42, cy - scale * 0.42);
  ctx.fill();
  // Wave texture
  ctx.fillStyle = '#3a2210';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.10, cy - scale * 0.72, scale * 0.20, scale * 0.08, -0.35, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.16, cy - scale * 0.80, scale * 0.18, scale * 0.07, 0.25, 0, Math.PI * 2); ctx.fill();

  // Eyebrows — rise with vol
  const browRise = lerp(0, scale * 0.06, vol);
  ctx.strokeStyle = '#3a2010'; ctx.lineWidth = scale * 0.042; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.37, cy - scale * 0.28 - browRise);
  ctx.bezierCurveTo(cx - scale * 0.20, cy - scale * 0.34 - browRise, cx - scale * 0.08, cy - scale * 0.31 - browRise, cx - scale * 0.02, cy - scale * 0.27 - browRise);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + scale * 0.37, cy - scale * 0.28 - browRise);
  ctx.bezierCurveTo(cx + scale * 0.20, cy - scale * 0.34 - browRise, cx + scale * 0.08, cy - scale * 0.31 - browRise, cx + scale * 0.02, cy - scale * 0.27 - browRise);
  ctx.stroke();

  // Eyes — open warmly with smile
  const eyeY  = cy - scale * 0.14;
  const eyeH  = lerp(scale * 0.07, scale * 0.12, vol);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.23, eyeY, scale * 0.12, eyeH, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.23, eyeY, scale * 0.12, eyeH, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#5a3818';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.23, eyeY, scale * 0.07, Math.min(eyeH * 0.9, scale * 0.07), 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.23, eyeY, scale * 0.07, Math.min(eyeH * 0.9, scale * 0.07), 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.23, eyeY, scale * 0.032, Math.min(eyeH * 0.5, scale * 0.032), 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.23, eyeY, scale * 0.032, Math.min(eyeH * 0.5, scale * 0.032), 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(cx - scale * 0.17, eyeY - eyeH * 0.3, scale * 0.016, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + scale * 0.29, eyeY - eyeH * 0.3, scale * 0.016, 0, Math.PI * 2); ctx.fill();
  // Smile crinkle lines at eye corners
  ctx.strokeStyle = '#c89870'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  [[-1, 1], [1, 1]].forEach(([side]) => {
    ctx.beginPath();
    ctx.moveTo(cx + side * scale * 0.34, eyeY + eyeH);
    ctx.bezierCurveTo(cx + side * scale * 0.40, eyeY + eyeH * 2.0, cx + side * scale * 0.42, eyeY + eyeH * 2.8, cx + side * scale * 0.36, eyeY + eyeH * 3.4);
    ctx.stroke();
  });

  // Slim nose
  ctx.strokeStyle = '#c89060'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx - scale * 0.052, cy + scale * 0.10, scale * 0.042, Math.PI * 0.05, Math.PI * 0.95); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + scale * 0.052, cy + scale * 0.10, scale * 0.042, Math.PI * 0.05, Math.PI * 0.95); ctx.stroke();

  // THE big smile — starts wide, goes huge
  const mouthY = cy + scale * 0.30;
  const smileW = lerp(scale * 0.36, scale * 0.50, vol);
  const openH  = lerp(scale * 0.06, scale * 0.38, vol);

  // Lips
  ctx.fillStyle = '#c06050';
  ctx.beginPath();
  ctx.moveTo(cx - smileW, mouthY);
  ctx.bezierCurveTo(cx - smileW * 0.55, mouthY - scale * 0.05, cx + smileW * 0.55, mouthY - scale * 0.05, cx + smileW, mouthY);
  ctx.bezierCurveTo(cx + smileW * 0.62, mouthY + openH * 0.75, cx - smileW * 0.62, mouthY + openH * 0.75, cx - smileW, mouthY);
  ctx.closePath(); ctx.fill();

  // Teeth — always showing (he's always smiling)
  ctx.fillStyle = '#f8f4f0';
  ctx.beginPath();
  ctx.moveTo(cx - smileW * 0.88, mouthY + scale * 0.008);
  ctx.lineTo(cx + smileW * 0.88, mouthY + scale * 0.008);
  ctx.bezierCurveTo(cx + smileW * 0.60, mouthY + openH * 0.52, cx - smileW * 0.60, mouthY + openH * 0.52, cx - smileW * 0.88, mouthY + scale * 0.008);
  ctx.closePath(); ctx.fill();
  // Tooth dividers
  ctx.strokeStyle = '#ddd8d0'; ctx.lineWidth = 1;
  for (let i = 1; i < 7; i++) {
    const tx = cx - smileW * 0.72 + i * (smileW * 1.44 / 7);
    ctx.beginPath(); ctx.moveTo(tx, mouthY + scale * 0.01); ctx.lineTo(tx, mouthY + openH * 0.44); ctx.stroke();
  }

  // Dark interior when wide open
  if (openH > scale * 0.12) {
    ctx.fillStyle = '#2a0a08';
    ctx.beginPath();
    ctx.ellipse(cx, mouthY + openH * 0.62, smileW * 0.52, openH * 0.30, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Nasolabial smile lines
  ctx.strokeStyle = '#c09070'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - scale * 0.26, cy + scale * 0.10); ctx.bezierCurveTo(cx - scale * 0.38, cy + scale * 0.22, cx - scale * 0.44, cy + scale * 0.28, cx - smileW * 0.88, mouthY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + scale * 0.26, cy + scale * 0.10); ctx.bezierCurveTo(cx + scale * 0.38, cy + scale * 0.22, cx + scale * 0.44, cy + scale * 0.28, cx + smileW * 0.88, mouthY); ctx.stroke();
}

// 6. Abstract Geometric
function drawGeometric(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const unit = Math.min(W, H) * 0.06;

  const hue = Math.floor(vol * 60); // slight color shift with volume

  // Head: big rectangle
  const hw = unit * 5, hh = unit * 7;
  ctx.strokeStyle = `hsl(${hue}, 80%, 70%)`;
  ctx.lineWidth = 3;
  ctx.strokeRect(cx - hw, cy - hh, hw * 2, hh * 2);

  // Eyes: triangles
  const eyeSize = lerp(unit * 0.8, unit * 1.4, vol);
  const eyeY = cy - hh * 0.3;
  [-1, 1].forEach(side => {
    const ex = cx + side * hw * 0.5;
    ctx.strokeStyle = `hsl(${hue}, 80%, 70%)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ex, eyeY - eyeSize);
    ctx.lineTo(ex + eyeSize, eyeY + eyeSize);
    ctx.lineTo(ex - eyeSize, eyeY + eyeSize);
    ctx.closePath(); ctx.stroke();
  });

  // Nose: small diamond
  ctx.beginPath();
  ctx.moveTo(cx, cy - unit * 0.4);
  ctx.lineTo(cx + unit * 0.5, cy);
  ctx.lineTo(cx, cy + unit * 0.4);
  ctx.lineTo(cx - unit * 0.5, cy);
  ctx.closePath(); ctx.stroke();

  // Mouth: rectangle that grows vertically
  const mw = hw * 1.0;
  const mh = lerp(unit * 0.3, unit * 4, vol);
  const mouthY = cy + hh * 0.3;
  ctx.fillStyle = `hsl(${hue}, 80%, 15%)`;
  ctx.fillRect(cx - mw / 2, mouthY, mw, mh);
  ctx.strokeStyle = `hsl(${hue}, 80%, 70%)`;
  ctx.lineWidth = 3;
  ctx.strokeRect(cx - mw / 2, mouthY, mw, mh);

  // Scan lines inside mouth at high vol
  if (vol > 0.3) {
    ctx.strokeStyle = `hsl(${hue}, 80%, 40%)`;
    ctx.lineWidth = 1;
    const lines = Math.floor(mh / 8);
    for (let i = 1; i <= lines; i++) {
      const ly = mouthY + i * (mh / (lines + 1));
      ctx.beginPath();
      ctx.moveTo(cx - mw / 2 + 4, ly);
      ctx.lineTo(cx + mw / 2 - 4, ly);
      ctx.stroke();
    }
  }
}

// 7. Expressive Elderly Face
function drawElderly(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const headW = W * 0.25, headH = H * 0.38;

  // Head: slightly saggy oval
  ctx.fillStyle = '#e8c89a';
  ctx.beginPath();
  ctx.moveTo(cx - headW * 0.7, cy - headH * 0.4);
  ctx.bezierCurveTo(cx - headW * 0.9, cy - headH * 0.7, cx - headW * 0.7, cy - headH, cx, cy - headH);
  ctx.bezierCurveTo(cx + headW * 0.7, cy - headH, cx + headW * 0.9, cy - headH * 0.7, cx + headW * 0.7, cy - headH * 0.4);
  ctx.bezierCurveTo(cx + headW * 1.0, cy + headH * 0.3, cx + headW * 0.6, cy + headH, cx, cy + headH);
  ctx.bezierCurveTo(cx - headW * 0.6, cy + headH, cx - headW * 1.0, cy + headH * 0.3, cx - headW * 0.7, cy - headH * 0.4);
  ctx.fill();
  ctx.strokeStyle = '#c8986a'; ctx.lineWidth = 3; ctx.stroke();

  // Wrinkles (bezier curves)
  ctx.strokeStyle = '#c8986a'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  // Forehead
  [[-0.3, -0.55, 0.3, -0.55], [-0.25, -0.48, 0.25, -0.48]].forEach(([x1, y1, x2, y2]) => {
    ctx.beginPath();
    ctx.moveTo(cx + x1 * headW, cy + y1 * headH);
    ctx.bezierCurveTo(cx + (x1 + 0.1) * headW, cy + (y1 - 0.05) * headH, cx + (x2 - 0.1) * headW, cy + (y2 - 0.05) * headH, cx + x2 * headW, cy + y2 * headH);
    ctx.stroke();
  });
  // Cheek lines
  ctx.beginPath(); ctx.moveTo(cx - headW * 0.65, cy - headH * 0.1); ctx.bezierCurveTo(cx - headW * 0.6, cy + headH * 0.15, cx - headW * 0.55, cy + headH * 0.3, cx - headW * 0.45, cy + headH * 0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + headW * 0.65, cy - headH * 0.1); ctx.bezierCurveTo(cx + headW * 0.6, cy + headH * 0.15, cx + headW * 0.55, cy + headH * 0.3, cx + headW * 0.45, cy + headH * 0.4); ctx.stroke();

  // Bushy eyebrows that rise
  const browRise = lerp(0, headH * 0.12, vol);
  ctx.strokeStyle = '#666'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    const bx = cx + side * headW * 0.35;
    const by = cy - headH * 0.45 - browRise;
    ctx.beginPath();
    ctx.moveTo(bx - side * headW * 0.2, by + 4);
    ctx.bezierCurveTo(bx, by - 6, bx + side * headW * 0.1, by + 2, bx + side * headW * 0.22, by + 6);
    ctx.stroke();
  });

  // Eyes: small, deep-set
  const eyeY = cy - headH * 0.28;
  ctx.fillStyle = '#5a3a1a';
  [-1, 1].forEach(side => {
    const ex = cx + side * headW * 0.35;
    const eyeH = lerp(6, 10, vol);
    ctx.beginPath(); ctx.ellipse(ex, eyeY, 9, eyeH, 0, 0, Math.PI * 2); ctx.fill();
  });

  // Nose: large bulb
  ctx.fillStyle = '#d4a070';
  ctx.beginPath(); ctx.ellipse(cx, cy + headH * 0.02, headW * 0.14, headH * 0.1, 0, 0, Math.PI * 2); ctx.fill();

  // Mouth: toothless, opens wide
  const mouthY = cy + headH * 0.35;
  const mouthW = headW * 0.65;
  const openH = lerp(0, headH * 0.28, vol);
  ctx.fillStyle = '#5a2010';
  ctx.beginPath();
  ctx.moveTo(cx - mouthW / 2, mouthY);
  ctx.bezierCurveTo(cx - mouthW / 4, mouthY + openH * 1.2, cx + mouthW / 4, mouthY + openH * 1.2, cx + mouthW / 2, mouthY);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#c8986a'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - mouthW / 2, mouthY);
  ctx.bezierCurveTo(cx - mouthW / 4, mouthY + openH * 1.2, cx + mouthW / 4, mouthY + openH * 1.2, cx + mouthW / 2, mouthY);
  ctx.stroke();
}

// 8. Baby/Child Face
function drawBaby(ctx, W, H, vol) {
  const cx = W / 2, cy = H / 2;
  const headR = Math.min(W, H) * 0.32;

  // Chubby cheeks
  ctx.fillStyle = '#ffcba4';
  ctx.beginPath(); ctx.ellipse(cx - headR * 0.85, cy + headR * 0.1, headR * 0.45, headR * 0.38, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + headR * 0.85, cy + headR * 0.1, headR * 0.45, headR * 0.38, 0.2, 0, Math.PI * 2); ctx.fill();

  // Big round head
  ctx.fillStyle = '#ffe0b2';
  ctx.beginPath(); ctx.arc(cx, cy, headR, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#ffb07c'; ctx.lineWidth = 3; ctx.stroke();

  // Blush circles
  const blush = Math.max(0.2, vol * 0.6);
  ctx.fillStyle = `rgba(255, 150, 150, ${blush})`;
  ctx.beginPath(); ctx.ellipse(cx - headR * 0.52, cy + headR * 0.12, headR * 0.18, headR * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + headR * 0.52, cy + headR * 0.12, headR * 0.18, headR * 0.12, 0, 0, Math.PI * 2); ctx.fill();

  // Big wide eyes that open more
  const eyeY = cy - headR * 0.2;
  const eyeRX = lerp(headR * 0.16, headR * 0.22, vol);
  const eyeRY = lerp(headR * 0.18, headR * 0.26, vol);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(cx - headR * 0.34, eyeY, eyeRX, eyeRY, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + headR * 0.34, eyeY, eyeRX, eyeRY, 0, 0, Math.PI * 2); ctx.fill();
  // Irises
  ctx.fillStyle = '#6699cc';
  ctx.beginPath(); ctx.ellipse(cx - headR * 0.34, eyeY, eyeRX * 0.65, eyeRY * 0.65, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + headR * 0.34, eyeY, eyeRX * 0.65, eyeRY * 0.65, 0, 0, Math.PI * 2); ctx.fill();
  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(cx - headR * 0.34, eyeY, eyeRX * 0.3, eyeRY * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + headR * 0.34, eyeY, eyeRX * 0.3, eyeRY * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  // Highlights
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(cx - headR * 0.27, eyeY - eyeRY * 0.3, eyeRX * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + headR * 0.41, eyeY - eyeRY * 0.3, eyeRX * 0.18, 0, Math.PI * 2); ctx.fill();

  // Tiny nose
  ctx.strokeStyle = '#ffb07c'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx - 7, cy + headR * 0.1, 6, Math.PI * 0.2, Math.PI * 0.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx + 7, cy + headR * 0.1, 6, Math.PI * 0.2, Math.PI * 0.8);
  ctx.stroke();

  // Mouth: small O that opens
  const mouthY = cy + headR * 0.42;
  const mouthW = lerp(headR * 0.12, headR * 0.55, vol);
  const mouthH = lerp(headR * 0.06, headR * 0.38, vol);
  ctx.fillStyle = '#c0392b';
  ctx.beginPath(); ctx.ellipse(cx, mouthY, mouthW, mouthH, 0, 0, Math.PI * 2); ctx.fill();
  if (vol > 0.2) {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(cx, mouthY - mouthH * 0.15, mouthW * 0.7, mouthH * 0.35, 0, 0, Math.PI); ctx.fill();
  }
}

// 9. Patrick Mahomes
function drawMahomes(ctx, W, H, vol) {
  const cx = W / 2, cy = H * 0.57;
  const scale = Math.min(W, H) * 0.32;

  // Jersey / neck
  ctx.fillStyle = '#c8102e';
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.85, H);
  ctx.lineTo(cx - scale * 0.75, cy + scale * 0.75);
  ctx.bezierCurveTo(cx - scale * 0.5, cy + scale * 0.62, cx + scale * 0.5, cy + scale * 0.62, cx + scale * 0.75, cy + scale * 0.75);
  ctx.lineTo(cx + scale * 0.85, H);
  ctx.closePath();
  ctx.fill();

  // Jersey number 15
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${scale * 0.28}px Impact, Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('15', cx, cy + scale * 1.05);

  // Neck
  ctx.fillStyle = '#8b5e3c';
  ctx.beginPath();
  ctx.rect(cx - scale * 0.22, cy + scale * 0.5, scale * 0.44, scale * 0.28);
  ctx.fill();

  // Jaw / face base — wide strong jaw
  ctx.fillStyle = '#8b5e3c';
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.55, cy - scale * 0.1);
  ctx.bezierCurveTo(cx - scale * 0.58, cy + scale * 0.35, cx - scale * 0.4, cy + scale * 0.6, cx, cy + scale * 0.62);
  ctx.bezierCurveTo(cx + scale * 0.4, cy + scale * 0.6, cx + scale * 0.58, cy + scale * 0.35, cx + scale * 0.55, cy - scale * 0.1);
  ctx.bezierCurveTo(cx + scale * 0.52, cy - scale * 0.55, cx - scale * 0.52, cy - scale * 0.55, cx - scale * 0.55, cy - scale * 0.1);
  ctx.fill();

  // Ear left
  ctx.fillStyle = '#7a5230';
  ctx.beginPath(); ctx.ellipse(cx - scale * 0.56, cy + scale * 0.1, scale * 0.07, scale * 0.11, -0.2, 0, Math.PI * 2); ctx.fill();
  // Ear right
  ctx.beginPath(); ctx.ellipse(cx + scale * 0.56, cy + scale * 0.1, scale * 0.07, scale * 0.11, 0.2, 0, Math.PI * 2); ctx.fill();

  // Goatee / beard shadow
  ctx.fillStyle = '#3a2010';
  ctx.globalAlpha = 0.45;
  ctx.beginPath();
  ctx.ellipse(cx, cy + scale * 0.42, scale * 0.28, scale * 0.14, 0, 0, Math.PI * 2);
  ctx.fill();
  // Mustache
  ctx.beginPath();
  ctx.ellipse(cx, cy + scale * 0.18, scale * 0.2, scale * 0.055, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Brows — thick, expressive, rise with volume
  const browRise = lerp(0, scale * 0.1, vol);
  const browFurrow = lerp(scale * 0.05, 0, vol); // furrow inward at rest, relaxes when loud
  ctx.strokeStyle = '#1a0a00';
  ctx.lineWidth = scale * 0.055;
  ctx.lineCap = 'round';
  // Left brow
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.48, cy - scale * 0.37 - browRise);
  ctx.bezierCurveTo(
    cx - scale * 0.28, cy - scale * 0.42 - browRise - browFurrow,
    cx - scale * 0.12, cy - scale * 0.41 - browRise - browFurrow,
    cx - scale * 0.05, cy - scale * 0.37 - browRise
  );
  ctx.stroke();
  // Right brow
  ctx.beginPath();
  ctx.moveTo(cx + scale * 0.48, cy - scale * 0.37 - browRise);
  ctx.bezierCurveTo(
    cx + scale * 0.28, cy - scale * 0.42 - browRise - browFurrow,
    cx + scale * 0.12, cy - scale * 0.41 - browRise - browFurrow,
    cx + scale * 0.05, cy - scale * 0.37 - browRise
  );
  ctx.stroke();

  // Eyes — almond-shaped, slightly hooded
  const eyeOpen = lerp(scale * 0.08, scale * 0.14, vol);
  const eyeY = cy - scale * 0.24;
  [-1, 1].forEach(side => {
    const ex = cx + side * scale * 0.27;
    // White
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, scale * 0.13, eyeOpen, 0, 0, Math.PI * 2);
    ctx.fill();
    // Iris — dark brown
    ctx.fillStyle = '#2a1a08';
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, scale * 0.075, Math.min(eyeOpen * 0.92, scale * 0.075), 0, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(ex, eyeY, scale * 0.038, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath();
    ctx.arc(ex + scale * 0.025, eyeY - scale * 0.025, scale * 0.018, 0, Math.PI * 2);
    ctx.fill();
    // Eyelid shadow (hooded)
    ctx.fillStyle = '#7a5230';
    ctx.globalAlpha = lerp(0.6, 0.15, vol);
    ctx.beginPath();
    ctx.ellipse(ex, eyeY - eyeOpen * 0.3, scale * 0.14, eyeOpen * 0.55, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Nose — broad, flared nostrils
  const noseY = cy + scale * 0.04;
  ctx.fillStyle = '#7a5230';
  ctx.beginPath();
  ctx.ellipse(cx, noseY, scale * 0.09, scale * 0.075, 0, 0, Math.PI * 2);
  ctx.fill();
  // Nostrils
  ctx.fillStyle = '#3a2010';
  ctx.beginPath();
  ctx.ellipse(cx - scale * 0.1, noseY + scale * 0.02, scale * 0.048, scale * 0.032, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + scale * 0.1, noseY + scale * 0.02, scale * 0.048, scale * 0.032, 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Mouth — the signature Mahomes wide yell
  const mouthY = cy + scale * 0.28;
  const mouthW = lerp(scale * 0.25, scale * 0.52, vol);
  const jawDrop = lerp(scale * 0.02, scale * 0.46, vol);

  // Lips outer
  ctx.fillStyle = '#5a2a18';
  ctx.beginPath();
  // Upper lip
  ctx.moveTo(cx - mouthW, mouthY);
  ctx.bezierCurveTo(cx - mouthW * 0.5, mouthY - scale * 0.045, cx - mouthW * 0.15, mouthY - scale * 0.06, cx, mouthY - scale * 0.04);
  ctx.bezierCurveTo(cx + mouthW * 0.15, mouthY - scale * 0.06, cx + mouthW * 0.5, mouthY - scale * 0.045, cx + mouthW, mouthY);
  // Lower lip
  ctx.bezierCurveTo(cx + mouthW * 0.6, mouthY + jawDrop * 0.35, cx + mouthW * 0.3, mouthY + jawDrop, cx, mouthY + jawDrop);
  ctx.bezierCurveTo(cx - mouthW * 0.3, mouthY + jawDrop, cx - mouthW * 0.6, mouthY + jawDrop * 0.35, cx - mouthW, mouthY);
  ctx.closePath();
  ctx.fill();

  // Mouth interior
  if (jawDrop > scale * 0.04) {
    ctx.fillStyle = '#1a0808';
    ctx.beginPath();
    ctx.moveTo(cx - mouthW * 0.88, mouthY + scale * 0.01);
    ctx.bezierCurveTo(cx - mouthW * 0.5, mouthY + scale * 0.01, cx + mouthW * 0.5, mouthY + scale * 0.01, cx + mouthW * 0.88, mouthY + scale * 0.01);
    ctx.bezierCurveTo(cx + mouthW * 0.55, mouthY + jawDrop * 0.88, cx - mouthW * 0.55, mouthY + jawDrop * 0.88, cx - mouthW * 0.88, mouthY + scale * 0.01);
    ctx.closePath();
    ctx.fill();

    // Teeth — top row
    if (jawDrop > scale * 0.08) {
      const teethH = Math.min(jawDrop * 0.38, scale * 0.12);
      const teethW = mouthW * 1.6;
      ctx.fillStyle = '#f0ece8';
      ctx.beginPath();
      ctx.roundRect(cx - teethW / 2, mouthY + scale * 0.01, teethW, teethH, [0, 0, 4, 4]);
      ctx.fill();
      // Tooth dividers
      ctx.strokeStyle = '#c8c0b0';
      ctx.lineWidth = 1.5;
      const numTeeth = 6;
      for (let i = 1; i < numTeeth; i++) {
        const tx = cx - teethW / 2 + (teethW / numTeeth) * i;
        ctx.beginPath();
        ctx.moveTo(tx, mouthY + scale * 0.012);
        ctx.lineTo(tx, mouthY + scale * 0.01 + teethH * 0.85);
        ctx.stroke();
      }

      // Tongue at high volume
      if (vol > 0.55) {
        ctx.fillStyle = '#c0392b';
        const tongueY = mouthY + teethH + scale * 0.02;
        const tongueH = (jawDrop - teethH) * 0.55;
        ctx.beginPath();
        ctx.ellipse(cx, tongueY + tongueH / 2, mouthW * 0.55, tongueH / 2 + scale * 0.01, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ── Hair (drawn last, sits on top of face) ──────────────────────────────────
  const hairBounce = lerp(0, scale * 0.08, vol);
  const hairRootY = cy - scale * 0.50;
  ctx.fillStyle = '#1a0e06';

  // Wide lateral dreads — extend far left and right from the head
  // Left dread mass: sweeps out to the left from mid-scalp
  ctx.beginPath();
  ctx.ellipse(cx - scale * 0.72, hairRootY - scale * 0.18 - hairBounce * 0.4,
              scale * 0.46, scale * 0.28, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx - scale * 0.92, hairRootY - scale * 0.38 - hairBounce * 0.5,
              scale * 0.32, scale * 0.22, -0.65, 0, Math.PI * 2);
  ctx.fill();
  // Tip of left dread
  ctx.beginPath();
  ctx.ellipse(cx - scale * 1.05, hairRootY - scale * 0.55 - hairBounce * 0.6,
              scale * 0.20, scale * 0.16, -0.8, 0, Math.PI * 2);
  ctx.fill();

  // Right dread mass
  ctx.beginPath();
  ctx.ellipse(cx + scale * 0.72, hairRootY - scale * 0.18 - hairBounce * 0.4,
              scale * 0.46, scale * 0.28, 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + scale * 0.92, hairRootY - scale * 0.38 - hairBounce * 0.5,
              scale * 0.32, scale * 0.22, 0.65, 0, Math.PI * 2);
  ctx.fill();
  // Tip of right dread
  ctx.beginPath();
  ctx.ellipse(cx + scale * 1.05, hairRootY - scale * 0.55 - hairBounce * 0.6,
              scale * 0.20, scale * 0.16, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Central base connecting to scalp
  ctx.beginPath();
  ctx.ellipse(cx, hairRootY + scale * 0.02, scale * 0.50, scale * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mid-rise center poof
  ctx.beginPath();
  ctx.ellipse(cx, hairRootY - scale * 0.32 - hairBounce * 0.4,
              scale * 0.46, scale * 0.36, 0, 0, Math.PI * 2);
  ctx.fill();

  // Crown top — rises up
  ctx.beginPath();
  ctx.ellipse(cx, hairRootY - scale * 0.75 - hairBounce,
              scale * 0.40, scale * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx, hairRootY - scale * 1.02 - hairBounce,
              scale * 0.24, scale * 0.20, 0, 0, Math.PI * 2);
  ctx.fill();

  // Curl texture — distributed across crown and side dreads
  ctx.fillStyle = '#0a0603';
  const poofCY = hairRootY - scale * 0.70 - hairBounce;
  [
    // Crown
    [-0.22, -0.44], [0, -0.52], [0.22, -0.44],
    [-0.30, -0.20], [-0.08, -0.34], [0.08, -0.34], [0.30, -0.20],
    [-0.22,  0.04], [0, -0.08], [0.22,  0.04],
    // Left wing curls
    [-0.60, -0.10], [-0.78, -0.26], [-0.92, -0.40],
    // Right wing curls
    [ 0.60, -0.10], [ 0.78, -0.26], [ 0.92, -0.40],
  ].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.arc(cx + dx * scale, poofCY + dy * scale, scale * 0.08, 0, Math.PI * 2);
    ctx.fill();
  });

  // Forehead skin patch under hairline
  ctx.fillStyle = '#8b5e3c';
  ctx.beginPath();
  ctx.ellipse(cx, cy - scale * 0.48, scale * 0.52, scale * 0.09, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Headband — white strip across the forehead ────────────────────────────
  const hbY = cy - scale * 0.42;
  const hbH = scale * 0.10;
  const hbW = scale * 0.56;
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.ellipse(cx, hbY + hbH / 2, hbW, hbH / 2 + 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Subtle band shading
  ctx.strokeStyle = '#d0d0d0';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, hbY + hbH / 2, hbW, hbH / 2 + 2, 0, 0, Math.PI * 2);
  ctx.stroke();
}

// ─── Face registry ────────────────────────────────────────────────────────────
const faces = [
  { name: 'Mahomes',    draw: drawMahomes,    bg: '#0a0000' },
  { name: 'Blob',       draw: drawBraviFrog,  bg: '#000000' },
  { name: 'Stripes',    draw: drawStripes,    bg: '#000000' },
  { name: 'Pearl',      draw: drawPearl,      bg: '#080604' },
  { name: 'Bear',       draw: drawBear,       bg: '#000000' },
  { name: 'Parametric', draw: drawParametric, bg: '#000000' },
  { name: 'Happy',      draw: drawHappy,      bg: '#1a0a00' },
  { name: 'Monster',    draw: drawMonster,    bg: '#071a0d' },
  { name: 'Sad',        draw: drawSad,        bg: '#0a0a14' },
  { name: 'Geometric',  draw: drawGeometric,  bg: '#0a0814' },
  { name: 'Elderly',    draw: drawElderly,    bg: '#100a00' },
  { name: 'Baby',       draw: drawBaby,       bg: '#100808' },
  { name: 'Greg',       draw: drawGreg,       bg: '#0a0a0a' },
];

let currentFace = 0;
let transitionFace = -1;
let transitionAlpha = 1;
let transitionDir = 0;

// ─── Dots indicator ──────────────────────────────────────────────────────────
const dotsEl = document.getElementById('dots');
faces.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goToFace(i));
  dotsEl.appendChild(d);
});

function updateDots() {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentFace);
  });
}

// ─── Navigation ──────────────────────────────────────────────────────────────
let uiVisible = false;
let uiTimer = null;

const toolbarEl = document.getElementById('toolbar');

function showUI() {
  uiVisible = true;
  dotsEl.classList.add('visible');
  document.getElementById('nav-arrows').classList.add('visible');
  clearTimeout(uiTimer);
  uiTimer = setTimeout(hideUI, 3000);
}

function hideUI() {
  uiVisible = false;
  dotsEl.classList.remove('visible');
  document.getElementById('nav-arrows').classList.remove('visible');
}

function goToFace(idx, dir = 0) {
  if (idx === currentFace) return;
  transitionFace = currentFace;
  transitionDir = dir;
  transitionAlpha = 0;
  currentFace = ((idx % faces.length) + faces.length) % faces.length;
  updateDots();
}

document.getElementById('prev-btn').addEventListener('click', () => goToFace(currentFace - 1, -1));
document.getElementById('next-btn').addEventListener('click', () => goToFace(currentFace + 1, 1));

// ─── Touch / swipe ────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) goToFace(currentFace + 1, 1);
    else goToFace(currentFace - 1, -1);
  } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    showUI();
  }
}, { passive: true });

// Keyboard
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { showUI(); goToFace(currentFace + 1, 1); }
  if (e.key === 'ArrowLeft')  { showUI(); goToFace(currentFace - 1, -1); }
});

// ─── Main draw loop ───────────────────────────────────────────────────────────
let running = false;
let faceWobble = 0;

function drawLoop() {
  if (!running) return;
  const W = window.innerWidth;
  const H = window.innerHeight;
  const vol = getVolume();

  // Wobble offset for high volume
  faceWobble = faceWobble * 0.8 + (vol > 0.6 ? (Math.random() - 0.5) * 8 * vol : 0) * 0.2;

  // Background
  const face = faces[currentFace];
  ctx.fillStyle = face.bg;
  ctx.fillRect(0, 0, W, H);

  // Draw transition (cross-fade)
  if (transitionFace >= 0) {
    transitionAlpha = Math.min(1, transitionAlpha + 0.08);
    // Old face fading out
    ctx.save();
    ctx.globalAlpha = 1 - transitionAlpha;
    ctx.fillStyle = faces[transitionFace].bg;
    ctx.fillRect(0, 0, W, H);
    ctx.translate(faceWobble, 0);
    faces[transitionFace].draw(ctx, W, H, vol);
    ctx.restore();
    // New face fading in
    ctx.save();
    ctx.globalAlpha = transitionAlpha;
    ctx.translate(faceWobble, 0);
    face.draw(ctx, W, H, vol);
    ctx.restore();
    if (transitionAlpha >= 1) transitionFace = -1;
  } else {
    ctx.save();
    ctx.translate(faceWobble, 0);
    face.draw(ctx, W, H, vol);
    ctx.restore();
  }

  requestAnimationFrame(drawLoop);
}

// ─── Toolbar: sensitivity slider ─────────────────────────────────────────────
const sensitivitySlider = document.getElementById('sensitivity-slider');
sensitivitySlider.value = Math.round(sensitivity * 100);
sensitivitySlider.addEventListener('input', () => {
  sensitivity = sensitivitySlider.value / 100;
  localStorage.setItem('blabla-sensitivity', sensitivity.toFixed(3));
});
// Prevent slider drag from hiding UI
sensitivitySlider.addEventListener('touchstart', e => { clearTimeout(uiTimer); }, { passive: true });
sensitivitySlider.addEventListener('touchend', () => { uiTimer = setTimeout(hideUI, 3000); }, { passive: true });

// ─── Menu ─────────────────────────────────────────────────────────────────────
const menuOverlay = document.getElementById('menu-overlay');
const faceGrid = document.getElementById('face-grid');
let thumbnailsRendered = false;

function renderThumbnails() {
  if (thumbnailsRendered) return;
  thumbnailsRendered = true;
  faces.forEach((face, i) => {
    const tile = document.createElement('div');
    tile.className = 'face-tile' + (i === currentFace ? ' active-face' : '');
    const c = document.createElement('canvas');
    const TW = 270, TH = 480;
    c.width = TW; c.height = TH;
    const tctx = c.getContext('2d');
    tctx.fillStyle = face.bg;
    tctx.fillRect(0, 0, TW, TH);
    try { face.draw(tctx, TW, TH, 0); } catch(e) {}
    const label = document.createElement('div');
    label.className = 'face-tile-name';
    label.textContent = face.name;
    tile.appendChild(c);
    tile.appendChild(label);
    tile.addEventListener('click', () => {
      closeMenu();
      goToFace(i);
    });
    faceGrid.appendChild(tile);
  });
}

function openMenu() {
  renderThumbnails();
  // refresh active highlight
  faceGrid.querySelectorAll('.face-tile').forEach((t, i) => {
    t.classList.toggle('active-face', i === currentFace);
  });
  menuOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMenu() {
  menuOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('toolbar-menu').addEventListener('click', openMenu);
document.getElementById('menu-close').addEventListener('click', closeMenu);

// ─── Info modal ───────────────────────────────────────────────────────────────
const infoModal = document.getElementById('info-modal');
document.getElementById('toolbar-info').addEventListener('click', () => {
  infoModal.classList.add('open');
});
document.getElementById('info-close').addEventListener('click', () => {
  infoModal.classList.remove('open');
});
infoModal.addEventListener('click', e => {
  if (e.target === infoModal) infoModal.classList.remove('open');
});

// ─── Start flow ───────────────────────────────────────────────────────────────
const startScreen = document.getElementById('start-screen');
const startBtn    = document.getElementById('start-btn');
const retryBtn    = document.getElementById('retry-btn');
const errorMsg    = document.getElementById('error-msg');

async function start() {
  startBtn.textContent = '...';
  startBtn.disabled = true;
  const ok = await startAudio();
  if (ok) {
    startScreen.style.display = 'none';
    running = true;
    showUI();
    requestAnimationFrame(drawLoop);
  } else {
    startBtn.style.display = 'none';
    retryBtn.style.display = 'block';
    errorMsg.style.display = 'block';
    startBtn.textContent = 'Start';
    startBtn.disabled = false;
  }
}

startBtn.addEventListener('click', start);
retryBtn.addEventListener('click', () => {
  retryBtn.style.display = 'none';
  errorMsg.style.display = 'none';
  startBtn.style.display = 'block';
  start();
});
</script>
